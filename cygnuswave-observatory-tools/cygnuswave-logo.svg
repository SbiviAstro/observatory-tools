<svg width="600" height="600" viewBox="0 0 340 340" xmlns="http://www.w3.org/2000/svg">
<rect x="0" y="0" width="340" height="340" fill="#D85A30"/>

<g transform="translate(170,140) scale(1.7) rotate(-45)">

<!-- asterism lines -->
<g stroke="#042C53" stroke-width="2.2" stroke-linecap="round">
<line x1="0" y1="-52" x2="0" y2="5"/>
<line x1="0" y1="5" x2="0" y2="30"/>
<line x1="0" y1="30" x2="0" y2="54"/>
<line x1="-42" y1="-12" x2="0" y2="5"/>
<line x1="0" y1="5" x2="36" y2="-8"/>
</g>
<g stroke="#042C53" stroke-width="1.3" stroke-linecap="round" opacity="0.7">
<line x1="36" y1="-8" x2="50" y2="-20"/>
<line x1="-42" y1="-12" x2="-54" y2="-2"/>
</g>
<line x1="0" y1="30" x2="12" y2="20" stroke="#042C53" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>

<!-- 9 stars -->
<circle cx="0" cy="-52" r="6.5" fill="#042C53"/>
<circle cx="0" cy="5" r="5" fill="#FFFFFF"/>
