<circle cx="12" cy="20" r="2.6" fill="none" stroke="#042C53" stroke-width="1.1"/>

<!-- Cygnus X-1 bow shock -->
<path d="M20 10 Q30 20 20 30" fill="none" stroke="#042C53" stroke-width="1.4" opacity="0.8" stroke-linecap="round"/>
<path d="M24 6 Q38 20 24 34" fill="none" stroke="#042C53" stroke-width="0.8" opacity="0.45" stroke-linecap="round"/>

</g>

<text x="170" y="316" text-anchor="middle" fill="#042C53" font-family="Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="0.5">cygnuswave.io</text>
